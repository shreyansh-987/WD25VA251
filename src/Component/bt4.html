<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result Calculator</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 90%;
            max-width: 500px;
            margin: 50px auto;
            background-color: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            color: #333;
        }

        label {
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        .result {
            margin-top: 20px;
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
        }

        .result p {
            font-size: 18px;
            margin: 10px 0;
        }

    </style>
</head>

<body>

    <div class="container">

        <h1>Student Result Calculator</h1>

        <label>Enter Number of Subjects:</label>

        <input type="number" id="subjectCount" placeholder="Enter subjects">

        <button onclick="calculateResult()">
            Calculate Result
        </button>

        <!-- Result Display -->
        <div id="output" class="result"></div>

    </div>

    <script>

        function calculateResult() {

            // Taking number of subjects
            let subjects = parseInt(document.getElementById("subjectCount").value);

            let total = 0;
            let marks;
            let average;
            let grade;
            let result = "Pass";

            // Loop for taking marks
            for (let i = 1; i <= subjects; i++) {

                marks = parseFloat(prompt("Enter marks for Subject " + i));

                // Condition for fail
                if (marks < 33) {
                    result = "Fail";
                }

                total = total + marks;
            }

            // Average calculation
            average = total / subjects;

            // Grade calculation using if-else
            if (average >= 90) {
                grade = "A+";
            }
            else if (average >= 75) {
                grade = "A";
            }
            else if (average >= 60) {
                grade = "B";
            }
            else if (average >= 45) {
                grade = "C";
            }
            else if (average >= 33) {
                grade = "D";
            }
            else {
                grade = "F";
            }

            // Display result dynamically
            document.getElementById("output").innerHTML = `
                <h2>Result</h2>
                <p><strong>Total Marks:</strong> ${total}</p>
                <p><strong>Average Marks:</strong> ${average.toFixed(2)}</p>
                <p><strong>Grade:</strong> ${grade}</p>
                <p><strong>Status:</strong> ${result}</p>
            `;
        }

    </script>

</body>
</html>
