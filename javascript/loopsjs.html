<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>loops in js</title>
</head>
<body>
    <script>
    let studentList=["vikash","vinay","deepak","sneha","shiva"];
    for(let i=0;i<studentList.length;i++){
        console.log(studentList[i]);
    }
    //while----------used when the number of iterations
    let x=0;
    while(x<studentList.length){
        console.log(studentList[x]);
        x++
    }
    //for ...of loop
    //iterates over the values of iterable objects (like ,arrays,strings,maps,and sets)
    for(let y of studentList){
        console.log(y);
    }



     let student={

         },
         course:"B.tech",
         branch:"CSE",
         year:2025,
        }
        for(let objkeys in student){
        console.log(student[objkeys]);
        }
    </script>
</body>
</html>
