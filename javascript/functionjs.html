<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // function a javascriot function is a block of code designid to performe a specific task
        //normal function with parameter
        function demo(){
            console.log("Hello JS");
        }
        demo();
        //normal function with parameter
        function demo1(text){
            console.log("Hello"+text);
        }
        demo1("React");
        //function with default parameters
        function add(a,b=10){
            console.log("addition of two number is:"+(a+b));
        }
        add(3);
        //anonymous function-
        //An anonymous function in JavaScript is a function that does not have an identifier (name) associated with it. These functions are primarily used for short, one-time tasks and are often assigned to variables or passed as arguments to other functions, preventing the clutter of unnecessary named functions in the global
        let cal=function(){
          var num1=4;
          var num2=5;
          var res=num1+num2;
          console.log("addition of num1 num2 :" + res);
        }
        cal();
        // arrow function 
        let div=(x,y)=>{
        var num1=x;
        var num2=y;
        var res=x/y;
        console.log("division is " + res);
        }
        div(12,3);
        //arrow function with single line statement
        let msg=()=>console.log("Hello ABES");
       msg();
       //callback function-
       //A callback function in JavaScript is a function that is passed as an argument to another function, to be "called back" or executed at a later point in time. This mechanism is fundamental to JavaScript's event-driven nature and handling asynchronous operations
       function sub(){
        var num1=10;
        var num2=5;
        var res=num1+num2;
        //callback(res);
       }
       function displayres(){
        console.log("result is"+res);
       }
       sub(displayres);
       //callback using setTimeout API
       function msg1(){
        console.log("hello frens");
       }
       setTimeout(msg1,2000)
    </script>
</body>
</html>
